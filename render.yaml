services:
  # =========================================================================
  # 1. BACKEND SERVICE (WEB SERVICE)
  # =========================================================================
  - type: web
    name: cinemax-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # MongoDB Atlas connection string — set this in the Render dashboard
      # ("Add Secret File" / env var). Data persists in MongoDB, not on the
      # ephemeral Render filesystem.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: allkikisweb@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_USER
        value: cinemaxmov01@gmail.com
      - key: BREVO_API_KEY
        value: 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
      # Optional extra CORS origins (comma-separated). WEBSITE_URL and
      # ADMIN_PANEL_URL below are already trusted automatically.
      - key: CORS_ORIGIN
        sync: false
      - key: WEBSITE_URL
        value: https://cinemaxmov.site.je
      - key: ADMIN_PANEL_URL
        fromService:
          type: static
          name: cinemaxmovie-admin
          envVarKey: RENDER_EXTERNAL_URL

  # =========================================================================
  # 2. ADMIN PANEL (STATIC SITE)
  # =========================================================================
  - type: static
    name: cinemaxmovie-admin
    env: static
    plan: free
    rootDir: admin
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_WEBSITE_API_URL
        fromService:
          type: web
          name: cinemax-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_WEBSITE_URL
        value: https://cinemaxmov.site.je

  # =========================================================================
  # 3. WEBSITE (MOVED TO INFINITYFREE)
  # =========================================================================
  # The main website frontend has been migrated to InfinityFree hosting
  # at cinemaxmov.site.je. This service is no longer deployed on Render.
  # Backend and Admin Panel remain on Render.
