<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-result {
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            background: white;
            border-left: 4px solid #ccc;
        }
        .success { border-left-color: #4CAF50; }
        .error { border-left-color: #f44336; }
        .info { border-left-color: #2196F3; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background: #1976D2; }
        pre {
            background: #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>API Connection Test for Cinemax</h1>
    <p>This page tests connectivity between InfinityFree frontend and Render backend.</p>
    
    <div id="results"></div>
    
    <button onclick="testHealthEndpoint()">Test Health Endpoint</button>
    <button onclick="testLoginEndpoint()">Test Login Endpoint</button>
    <button onclick="testCORS()">Test CORS Preflight</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <script>
        const BACKEND_URL = "https://cinemaxmovie-backend-1mol.onrender.com";
        const resultsDiv = document.getElementById('results');
        
        function addResult(message, type = 'info', details = null) {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${type.toUpperCase()}:</strong> ${message}`;
            if (details) {
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(details, null, 2);
                div.appendChild(pre);
            }
            resultsDiv.appendChild(div);
        }
        
        function clearResults() {
            resultsDiv.innerHTML = '';
        }
        
        async function testHealthEndpoint() {
            addResult('Testing health endpoint...', 'info');
            try {
                const response = await fetch(`${BACKEND_URL}/api/health`, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult('Health endpoint SUCCESS', 'success', data);
                } else {
                    addResult(`Health endpoint FAILED: ${response.status}`, 'error', { status: response.status, data });
                }
            } catch (error) {
                addResult(`Health endpoint ERROR: ${error.message}`, 'error', {
                    message: error.message,
                    stack: error.stack,
                    name: error.name
                });
            }
        }
        
        async function testLoginEndpoint() {
            addResult('Testing login endpoint...', 'info');
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    mode: 'cors',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'test123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok || response.status === 401) {
                    addResult('Login endpoint responded (expected 401 for invalid creds)', 'success', { 
                        status: response.status,
                        data 
                    });
                } else {
                    addResult(`Login endpoint FAILED: ${response.status}`, 'error', { status: response.status, data });
                }
            } catch (error) {
                addResult(`Login endpoint ERROR: ${error.message}`, 'error', {
                    message: error.message,
                    stack: error.stack,
                    name: error.name
                });
            }
        }
        
        async function testCORS() {
            addResult('Testing CORS preflight request...', 'info');
            try {
                const response = await fetch(`${BACKEND_URL}/api/health`, {
                    method: 'OPTIONS',
                    mode: 'cors',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'Content-Type'
                    }
                });
                
                const corsHeaders = {
                    'access-control-allow-origin': response.headers.get('access-control-allow-origin'),
                    'access-control-allow-methods': response.headers.get('access-control-allow-methods'),
                    'access-control-allow-headers': response.headers.get('access-control-allow-headers'),
                    'access-control-allow-credentials': response.headers.get('access-control-allow-credentials')
                };
                
                addResult('CORS preflight completed', response.ok ? 'success' : 'error', {
                    status: response.status,
                    corsHeaders
                });
            } catch (error) {
                addResult(`CORS preflight ERROR: ${error.message}`, 'error', {
                    message: error.message,
                    stack: error.stack,
                    name: error.name
                });
            }
        }
        
        // Auto-run health test on load
        window.onload = function() {
            addResult('Page loaded. Backend URL: ' + BACKEND_URL, 'info');
            addResult('Current origin: ' + window.location.origin, 'info');
        };
    </script>
</body>
</html>
